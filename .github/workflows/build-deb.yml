name: Build r8125-dkms

# Build r8125-dkms .deb targeted for Debian 13 (trixie)
# - 支持从仓库根的 tarball、workflow_dispatch 的 source_url、.SRCINFO 中的 source URL、或 Releases asset 下载源码
# - 可选将生成的 .deb 上传为 GitHub Release asset（通过 publish_release 输入控制）
# - 同时上传源码 tarball 到 Release asset
permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'Optional direct URL to r8125 tarball (if not included in the repo or releases)'
        required: false
      pkgver:
        description: 'Optional driver version (e.g. 9.017.01). If omitted the workflow will try to read PKGBUILD/.SRCINFO'
        required: false
      publish_release:
        description: 'If "true", create a GitHub Release and upload the .deb as an asset'
        required: false
        default: 'true'
      release_tag:
        description: 'Optional release tag to use (if omitted a tag including pkgver and run number will be created)'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:trixie-slim

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure required tools
        run: |
          apt-get update
          apt-get install -y --no-install-recommends dpkg-dev curl ca-certificates tar xz-utils bzip2 gzip jq

      - name: Determine package version and extract .SRCINFO source URL (if any)
        id: ver
        run: |
          set -euo pipefail
          # Determine PKGVER: input > PKGBUILD > .SRCINFO > fallback
          if [ -n "${{ github.event.inputs.pkgver }}" ]; then
            PKGVER="${{ github.event.inputs.pkgver }}"
            echo "Using provided pkgver: $PKGVER"
          else
            PKGVER=""
            if [ -f PKGBUILD ]; then
              PKGVER=$(grep -m1 '^pkgver=' PKGBUILD | sed -E 's/pkgver=(.*)/\1/' || true)
            fi
            if [ -z "$PKGVER" ] && [ -f .SRCINFO ]; then
              PKGVER=$(grep -m1 '^pkgver =' .SRCINFO | sed -E 's/^pkgver = //' || true)
            fi
            PKGVER=${PKGVER:-9.017.01}
            echo "Determined PKGVER=$PKGVER"
          fi
          echo "PKGVER=$PKGVER" >> $GITHUB_ENV

          # Try to extract first source URL from .SRCINFO (line starting with 'source = ')
          if [ -f .SRCINFO ]; then
            SRC_URL=$(grep -m1 '^source = ' .SRCINFO | sed -E 's/^source = //')
            if [ -n "$SRC_URL" ]; then
              echo "Found source URL in .SRCINFO: $SRC_URL"
              echo "SRC_SOURCE_URL=$SRC_URL" >> $GITHUB_ENV
            else
              echo "No source = line found in .SRCINFO"
            fi
          else
            echo ".SRCINFO not present"
          fi

      - name: Locate or download driver tarball
        run: |
          set -euo pipefail
          PKGVER="${PKGVER}"
          echo "PKGVER=$PKGVER"
          # 1) Prefer tarball already in the repository root
          TAR=$(ls r8125-*.tar.* 2>/dev/null | head -n1 || true)
          if [ -n "$TAR" ]; then
            echo "Found tarball in repo: $TAR"
            cp "$TAR" driver.tar.bz2
            echo "DRIVER_TARBALL_ORIGINAL=$TAR" >> $GITHUB_ENV
            exit 0
          fi

          # 2) Use workflow input source_url if provided
          if [ -n "${{ github.event.inputs.source_url }}" ]; then
            echo "Downloading driver tarball from provided URL"
            curl -L --fail "${{ github.event.inputs.source_url }}" -o driver.tar.bz2
            exit 0
          fi

          # 3) Try common release asset pattern in THIS repository (if someone uploaded it here)
          RELEASE_URL_THIS="https://github.com/${{ github.repository }}/releases/download/${PKGVER}-1/r8125-${PKGVER}.tar.bz2"
          echo "Trying release asset in this repo: $RELEASE_URL_THIS"
          if curl -L --fail -o driver.tar.bz2 "$RELEASE_URL_THIS"; then
            echo "Downloaded driver from this repo release asset"
            exit 0
          fi

          # 4) Try .SRCINFO source URL if present (this may point to devome's release or other host)
          if [ -n "${SRC_SOURCE_URL-}" ]; then
            echo "Trying source URL from .SRCINFO: $SRC_SOURCE_URL"
            if curl -L --fail -o driver.tar.bz2 "$SRC_SOURCE_URL"; then
              echo "Downloaded driver from .SRCINFO source URL"
              exit 0
            fi
          fi

          # 5) As a last resort, try a more general GitHub release URL computed from common pattern
          FALLBACK_URL="https://github.com/devome/r8125-dkms/releases/download/${PKGVER}-1/r8125-${PKGVER}.tar.bz2"
          echo "Trying fallback release URL: $FALLBACK_URL"
          if curl -L --fail -o driver.tar.bz2 "$FALLBACK_URL"; then
            echo "Downloaded driver from fallback devome release asset"
            exit 0
          fi

          echo "ERROR: No driver tarball found in repo, no source_url provided, and no release asset available."
          echo "Because Realtek uses verification, the workflow can't auto-download from realtek.com."
          echo "Please either:"
          echo "  - Add r8125-<version>.tar.bz2 into the repository root, or"
          echo "  - Upload the tarball as a Release asset (name: r8125-<version>.tar.bz2), or"
          echo "  - Provide a direct source_url when triggering the workflow."
          exit 1

      - name: Build Debian package (r8125-dkms .deb)
        env:
          PKGVER: ${{ env.PKGVER }}
        run: |
          set -euo pipefail
          PKGVER=${PKGVER}
          PKGNAME=r8125-dkms
          PKGVER_FULL="${PKGVER}-1"

          WORK=packdir
          rm -rf "$WORK"
          mkdir -p "$WORK/DEBIAN"

          # control
          if [ -f .CONTROL ]; then
            sed "s/^Version:.*/Version: ${PKGVER_FULL}/" .CONTROL > "$WORK/DEBIAN/control"
          else
            # use printf to avoid here-doc/indentation issues inside YAML run block
            printf '%s\n' \
              "Package: ${PKGNAME}" \
              "Version: ${PKGVER_FULL}" \
              "Section: non-free/kernel" \
              "Priority: optional" \
              "Architecture: all" \
              "Depends: dkms" \
              "Description: dkms source for the r8125 network driver" \
              > "$WORK/DEBIAN/control"
          fi

          # maintainer scripts
          if [ -f postinst.sh ]; then
            install -Dm755 postinst.sh "$WORK/DEBIAN/postinst"
          fi
          if [ -f prerm.sh ]; then
            install -Dm755 prerm.sh "$WORK/DEBIAN/prerm"
          fi

          SRCDIR="$WORK/usr/src/r8125-${PKGVER}"
          mkdir -p "$SRCDIR"

          # try common compression formats
          if tar -xjf driver.tar.bz2 -C "$SRCDIR" --strip-components=0 2>/dev/null; then
            :
          elif tar -xJf driver.tar.bz2 -C "$SRCDIR" --strip-components=0 2>/dev/null; then
            :
          elif tar -xzf driver.tar.bz2 -C "$SRCDIR" --strip-components=0 2>/dev/null; then
            :
          else
            echo "Failed to extract driver tarball with known formats"
            exit 1
          fi

          # copy local dkms.conf into src (some packages expect dkms.conf in src/)
          if [ -f dkms.conf ]; then
            install -Dm644 dkms.conf "$SRCDIR/src/dkms.conf"
          fi

          # docs
          if [ -f README ]; then
            install -Dm644 README "$WORK/usr/share/doc/${PKGNAME}/README"
          fi

          # permissions
          find "$WORK" -type d -print0 | xargs -0 chmod 755 || true
          find "$WORK" -type f -print0 | xargs -0 chmod 644 || true
          [ -f "$WORK/DEBIAN/postinst" ] && chmod 755 "$WORK/DEBIAN/postinst" || true
          [ -f "$WORK/DEBIAN/prerm" ] && chmod 755 "$WORK/DEBIAN/prerm" || true

          OUTPUT="${PKGNAME}_${PKGVER_FULL}_all.deb"
          dpkg-deb --build "$WORK" "$OUTPUT"
          echo "PACKAGE_BUILT=$OUTPUT" >> $GITHUB_ENV
          echo "PKGNAME=${PKGNAME}" >> $GITHUB_ENV

      - name: Upload .deb artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r8125-dkms-deb
          path: |
            ${{ env.PACKAGE_BUILT }}

      - name: Create Release and upload assets (.deb + source tarball)
        if: ${{ github.event.inputs.publish_release == 'true' }}
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PKGVER="${PKGVER}"
          PKGVER_FULL="${PKGVER}-1"
          # Use PACKAGE_BUILT if available (exported by the build step), otherwise fallback
          DEB_ASSET="./${PACKAGE_BUILT:-r8125-dkms_${PKGVER_FULL}_all.deb}"

          # release tag: use input release_tag if provided, otherwise generate unique tag per run
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
          else
            TAG="r8125-${PKGVER}-build-${{ github.run_number }}"
          fi

          # create release using GitHub API (GITHUB_TOKEN has write permission per workflow permissions)
          echo "Creating release with tag: $TAG"
          API_JSON=$(printf '{"tag_name":"%s","name":"%s","body":"%s","draft":false,"prerelease":false}' "$TAG" "r8125-dkms ${PKGVER} (build #${{ github.run_number }})" "Automated build of r8125-dkms ${PKGVER} (workflow run ${{ github.run_number }})")
          CREATE_RESP=$(curl -sSL -X POST -H "Authorization: token ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" https://api.github.com/repos/${{ github.repository }}/releases -d "$API_JSON")
          UPLOAD_URL=$(echo "$CREATE_RESP" | jq -r .upload_url | sed -e 's/{?name,label}//')
          if [ "$UPLOAD_URL" = "null" ] || [ -z "$UPLOAD_URL" ]; then
            echo "Failed to create release: $CREATE_RESP"
            exit 1
          fi
          echo "Release created, upload_url=$UPLOAD_URL"

          # upload .deb asset
          DEB_NAME=$(basename "$DEB_ASSET")
          echo "Uploading .deb asset: $DEB_NAME"
          curl -sSL -X POST -H "Authorization: token ${GITHUB_TOKEN}" -H "Content-Type: application/octet-stream" --data-binary @"$DEB_ASSET" "$UPLOAD_URL?name=$DEB_NAME" > /tmp/deb_upload_resp
          DEB_ASSET_URL=$(cat /tmp/deb_upload_resp | jq -r .browser_download_url)
          echo "DEB asset uploaded: $DEB_ASSET_URL"

          # upload source tarball if it exists
          if [ -f driver.tar.bz2 ]; then
            SRC_NAME="r8125-${PKGVER}.tar.bz2"
            echo "Uploading source tarball: $SRC_NAME"
            curl -sSL -X POST -H "Authorization: token ${GITHUB_TOKEN}" -H "Content-Type: application/octet-stream" --data-binary @driver.tar.bz2 "$UPLOAD_URL?name=$SRC_NAME" > /tmp/src_upload_resp
            SRC_ASSET_URL=$(cat /tmp/src_upload_resp | jq -r .browser_download_url)
            echo "Source tarball uploaded: $SRC_ASSET_URL"
            echo "SRC_ASSET_URL=${SRC_ASSET_URL}" >> $GITHUB_ENV
          else
            echo "Warning: driver.tar.bz2 not found, skipping source tarball upload"
          fi

          echo "DEB_ASSET_URL=${DEB_ASSET_URL}" >> $GITHUB_ENV
          echo "RELEASE_TAG=${TAG}" >> $GITHUB_ENV

      - name: Show release URL (if published)
        if: ${{ github.event.inputs.publish_release == 'true' }}
        run: |
          echo "Release tag: $RELEASE_TAG"
          echo ".deb asset URL: $DEB_ASSET_URL"
          if [ -n "${SRC_ASSET_URL-}" ]; then
            echo "Source tarball URL: $SRC_ASSET_URL"
          fi
